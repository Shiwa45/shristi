{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-10 bg-white p-8 rounded shadow">
    <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>
    <form method="post" novalidate>
        {% csrf_token %}
        {{ form.non_field_errors }}
        <div class="mb-4">
            <label for="id_username" class="block mb-1 font-semibold">Username</label>
            {{ form.username }}
            {{ form.username.errors }}
        </div>
        <div class="mb-4">
            <label for="id_password" class="block mb-1 font-semibold">Password</label>
            {{ form.password }}
            {{ form.password.errors }}
        </div>
        <button type="submit" class="w-full bg-purple-600 text-white py-2 rounded hover:bg-purple-700 transition">Login</button>
    </form>
</div>
{% endblock %}
