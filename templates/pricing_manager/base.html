<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block pm_title %}Pricing Manager{% endblock %} · Shristi Printing</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --theme:#7000fe; --header:#09052F; --bg:#f3f5ff; }
        * { box-sizing: border-box; }
        body {
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: #1f2937;
        }
        .pm-topbar {
            background: linear-gradient(135deg, var(--theme) 0%, var(--header) 100%);
            color: #fff; padding: 18px 28px; display: flex; align-items: center; justify-content: space-between;
        }
        .pm-topbar .brand { font-weight: 800; font-size: 1.15rem; display: flex; align-items: center; gap: 10px; }
        .pm-topbar a { color: #fff; text-decoration: none; opacity: .9; font-size: .88rem; }
        .pm-topbar a:hover { opacity: 1; }
        .pm-wrap { max-width: 1000px; margin: 0 auto; padding: 28px 20px 60px; }
        .pm-breadcrumb { font-size: .82rem; color: #6b7280; margin-bottom: 18px; }
        .pm-breadcrumb a { color: var(--theme); text-decoration: none; }
        .pm-breadcrumb a:hover { text-decoration: underline; }
        h1.pm-h1 { font-size: 1.5rem; font-weight: 800; color: var(--header); margin: 0 0 6px; }
        p.pm-sub { color: #6b7280; margin: 0 0 24px; font-size: .92rem; }
        .pm-card {
            background: #fff; border-radius: 14px; padding: 22px 24px; margin-bottom: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,.07);
        }
        .pm-msg {
            padding: 12px 18px; border-radius: 10px; margin-bottom: 18px; font-size: .9rem; font-weight: 600;
        }
        .pm-msg.success { background: #d1fae5; color: #065f46; }
        .pm-msg.error   { background: #fee2e2; color: #991b1b; }
        .pm-msg.info    { background: #dbeafe; color: #1e40af; }
        .pm-btn {
            display: inline-flex; align-items: center; gap: 8px; border: none; cursor: pointer;
            background: var(--theme); color: #fff; padding: 12px 24px; border-radius: 10px;
            font-size: .95rem; font-weight: 700; text-decoration: none; transition: all .2s;
        }
        .pm-btn:hover { background: var(--header); transform: translateY(-1px); }
        .pm-btn.secondary { background: #fff; color: #374151; border: 1.5px solid #d1d5db; }
        .pm-btn.secondary:hover { border-color: var(--theme); color: var(--theme); background: #faf7ff; }
        .price-input {
            width: 130px; padding: 9px 12px 9px 26px; border: 1.5px solid #d1d5db; border-radius: 8px;
            font-size: .95rem; font-weight: 600; color: #1f2937; text-align: right;
        }
        .price-input:focus { outline: none; border-color: var(--theme); box-shadow: 0 0 0 3px rgba(112,0,254,.12); }
        .price-wrap { position: relative; display: inline-block; }
        .price-wrap::before {
            content: '₹'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
            color: #9ca3af; font-weight: 700; font-size: .9rem;
        }
    </style>
    {% block pm_extra_css %}{% endblock %}
</head>
<body>
    <div class="pm-topbar">
        <div class="brand"><i class="fas fa-tags"></i> Pricing Manager</div>
        <div>
            <a href="{% url 'services:pricing_home' %}"><i class="fas fa-sliders-h"></i> Pricing Home</a>
            &nbsp;&nbsp;·&nbsp;&nbsp;
            <a href="/admin/"><i class="fas fa-cog"></i> Full Admin</a>
        </div>
    </div>
    <div class="pm-wrap">
        {% if messages %}
            {% for message in messages %}
            <div class="pm-msg {{ message.tags }}"><i class="fas fa-check-circle"></i> {{ message }}</div>
            {% endfor %}
        {% endif %}
        {% block pm_content %}{% endblock %}
    </div>
</body>
</html>
