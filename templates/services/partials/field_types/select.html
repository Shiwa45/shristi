{% load dynamic_form_tags %}

<style>
.sf-wrap { margin-bottom: 20px; }
.sf-label { display: block; font-weight: 600; font-size: .88rem; color: #1f2937; margin-bottom: 6px; }
.sf-help  { font-size: .78rem; color: #6b7280; margin-top: 5px; display: flex; align-items: center; gap: 4px; }
/* Override nice-select inside dynamic form to be full-width and on-theme */
.sf-wrap .nice-select {
    width: 100% !important;
    border: 2px solid #e5e7eb !important;
    border-radius: 8px !important;
    font-size: .92rem !important;
    color: #1f2937 !important;
    padding: 11px 40px 11px 14px !important;
    background: #fff !important;
    line-height: 1.4 !important;
    height: auto !important;
}
.sf-wrap .nice-select:hover,
.sf-wrap .nice-select.open {
    border-color: var(--theme, #7000fe) !important;
}
.sf-wrap .nice-select::after {
    border-color: #6b7280 !important;
    right: 16px !important;
}
.sf-wrap .nice-select .list {
    width: 100% !important;
    border-radius: 8px !important;
    box-shadow: 0 8px 24px rgba(0,0,0,.12) !important;
    border: 1px solid #e5e7eb !important;
}
.sf-wrap .nice-select .option:hover,
.sf-wrap .nice-select .option.selected {
    color: var(--theme, #7000fe) !important;
    background: #faf7ff !important;
}
/* Fallback: native select if nice-select doesn't load */
.sf-select-native {
    width: 100%;
    padding: 11px 14px;
    border: 2px solid #e5e7eb;
    border-radius: 8px;
    font-size: .92rem;
    color: #1f2937;
    background: #fff;
    appearance: none;
    -webkit-appearance: none;
    cursor: pointer;
    outline: none;
    transition: border-color .2s;
}
.sf-select-native:focus { border-color: var(--theme, #7000fe); }
</style>

<div class="sf-wrap" data-field-name="{{ field.field_name }}"{% if field.show_condition %} data-show-condition="{{ field.show_condition }}"{% endif %}>
    <label class="sf-label">
        {{ field.field_label }}
        {% if field.is_required %}<span style="color:#ef4444;">*</span>{% endif %}
    </label>

    <select name="{{ field.field_name }}"
            class="sf-select-native"
            {% if field.is_required %}required{% endif %}>
        <option value="">Select {{ field.field_label }}</option>
        {% for option in field_options %}
        <option value="{{ option.value }}"
                {% if current_value == option.value %}selected{% endif %}
                data-price-modifier="{{ option.price_modifier }}"
                {% if option.width_mm %}data-width-mm="{{ option.width_mm }}" data-height-mm="{{ option.height_mm|default:'' }}"{% endif %}>
            {{ option.label }}{% if option.price_modifier > 0 %} (+₹{{ option.price_modifier }}){% endif %}
        </option>
        {% endfor %}
    </select>

    {% if field.help_text %}
    <p class="sf-help"><i class="fas fa-info-circle"></i> {{ field.help_text }}</p>
    {% endif %}
</div>
