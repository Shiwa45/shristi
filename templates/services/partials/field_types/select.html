{% load dynamic_form_tags %}

<div class="form-field-container {{ field|get_field_css_classes }} mb-5" data-field-name="{{ field.field_name }}">
    <label class="block text-sm font-semibold text-gray-800 mb-2">
        {{ field.field_label }}
        {% if field.is_required %}<span class="text-red-500">*</span>{% endif %}
    </label>

    <div class="relative">
        <select name="{{ field.field_name }}" 
                class="block w-full appearance-none rounded-lg border border-gray-300 bg-white py-3 pl-4 pr-10 text-gray-700 shadow-sm focus:border-purple-500 focus:outline-none focus:ring-1 focus:ring-purple-500 sm:text-sm transition-all duration-200 hover:border-gray-400"
                {% if field.is_required %}required{% endif %}>
            <option value="">Select {{ field.field_label }}</option>
            {% for option in field_options %}
            <option value="{{ option.value }}" 
                    {% if current_value == option.value %}selected{% endif %}
                    data-price-modifier="{{ option.price_modifier }}">
                {{ option.label }} 
                {% if option.price_modifier > 0 %}(+₹{{ option.price_modifier }}){% endif %}
            </option>
            {% endfor %}
        </select>
        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500">
            <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd" />
            </svg>
        </div>
    </div>
    
    {% if field.help_text %}
    <p class="text-xs text-gray-500 mt-1.5 flex items-center">
        <i class="fas fa-info-circle mr-1"></i> {{ field.help_text }}
    </p>
    {% endif %}
</div>
