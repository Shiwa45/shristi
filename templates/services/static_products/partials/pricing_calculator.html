<div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
    <h3 class="text-lg font-bold text-gray-900 mb-4 flex items-center">
        <i class="fas fa-calculator text-blue-600 mr-2"></i>
        Price Estimator
    </h3>

    <div class="space-y-4">
        <!-- Dynamic Price Display -->
        <div class="price-display text-center p-4 bg-gray-50 rounded-lg">
            <div class="text-sm text-gray-500 mb-1">Total Estimated Price</div>
            <div class="text-3xl font-bold text-gray-900" id="total-price">₹{{ product.base_price }}</div>
            <div class="text-xs text-gray-500 mt-1">Excl. GST</div>
        </div>

        <!-- Quantity Selector -->
        <div class="form-group">
            <label class="block text-sm font-medium text-gray-700 mb-1">Quantity</label>
            <input type="number" id="quantity-input" name="quantity" value="{{ product.minimum_quantity|default:100 }}"
                min="{{ product.minimum_quantity|default:1 }}"
                class="block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm"
                onchange="updatePrice()">
        </div>

        <!-- Action Buttons -->
        <div class="space-y-3 pt-4">
            <button type="button"
                class="w-full bg-blue-600 text-white px-4 py-3 rounded-lg font-semibold hover:bg-blue-700 transition-colors flex items-center justify-center"
                onclick="addToCart()">
                <i class="fas fa-shopping-cart mr-2"></i>
                Add to Cart
            </button>

            <button type="button"
                class="w-full bg-white text-blue-600 border border-blue-600 px-4 py-3 rounded-lg font-semibold hover:bg-blue-50 transition-colors"
                onclick="requestQuote()">
                Request Custom Quote
            </button>
        </div>
    </div>
</div>

<script>
    function updatePrice() {
        // Basic placeholder for price update logic
        // In a real implementation, this would read from the form fields
        const basePrice = {{ product.base_price }
    };
    const qty = document.getElementById('quantity-input').value;
    const total = basePrice * qty; // Simplified
    // document.getElementById('total-price').innerText = '₹' + total.toFixed(2);
}

    function addToCart() {
        // Placeholder for add to cart logic
        alert('Added to cart!');
    }

    function requestQuote() {
        window.location.href = "{% url 'orders:quote_request' %}";
    }
</script>
