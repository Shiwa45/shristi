<!-- Related Products Partial -->
<style>
    .related-products-section {
        background-color: transparent;
        /* Transparent/White background */
        padding: 40px 0;
        margin-top: 60px;
    }

    .related-container {
        max-width: 1280px;
        margin: 0 auto;
        padding: 0 20px;
    }

    .related-heading {
        color: #1f2937;
        /* Dark text */
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 30px;
        text-align: left;
        /* Aligned left as per typical designs, or center if preferred. Image shows centered-ish relative to grid, but text align seems left or center. Let's stick to standard left for section headers or center if it looks better. The user image header is 'Related Products', looks Title case. */
    }

    /* Force left alignment if needed, but let's try strict start alignment for header if it matches the flow */
    .related-heading {
        text-align: left;
    }

    .related-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 30px;
    }

    .related-card {
        display: block;
        text-decoration: none;
        transition: transform 0.2s ease;
    }

    .related-card:hover {
        transform: translateY(-5px);
    }

    .related-img-wrapper {
        aspect-ratio: 1/1;
        background: #f3f4f6;
        /* Light gray background for the image box */
        border-radius: 16px;
        /* Rounded corners */
        overflow: hidden;
        margin-bottom: 15px;
        position: relative;
        /* No border as per screenshot */
    }

    .related-img-wrapper img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        /* Contain to show full product within the box like visible in screenshot */
        padding: 20px;
        /* Padding inside the grey box */
        transition: transform 0.3s ease;
    }

    /* If images are full bleed, object-fit: cover. But the screenshot shows products floating in the box (e.g. stickers). Let's use cover for consistency if they are photos, or contain if they are graphics. Let's try cover as safe default or contain if we want that 'sticker' look. The screenshot has a beige background in the card, and the image is on top. */
    .related-img-wrapper img {
        object-fit: cover;
        padding: 0;
    }

    .related-info {
        text-align: center;
    }

    .related-name {
        color: #1f2937;
        /* Dark text */
        font-size: 15px;
        font-weight: 700;
        margin-bottom: 0;
        line-height: 1.4;
    }

    /* Hide price as per screenshot */
    .related-price {
        display: none;
    }

    @media (max-width: 1024px) {
        .related-grid {
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .related-heading {
            text-align: center;
        }
    }

    @media (max-width: 640px) {
        .related-grid {
            grid-template-columns: repeat(1, 1fr);
        }
    }
</style>

{% if related_products %}
<div class="related-products-section">
    <div class="related-container">
        <h2 class="related-heading">Related Products</h2>
        <div class="related-grid">
            {% for related in related_products|slice:":4" %}
            <a href="{% url 'services:static_product_detail' category_slug=related.category.slug product_slug=related.slug %}"
                class="related-card">
                <!-- Apply a consistent background color to match the beige/grey look if the image is transparent, or just use the image -->
                <div class="related-img-wrapper" style="background-color: #eeebe6;">
                    {% if related.featured_image %}
                    <img src="{{ related.featured_image.url }}" alt="{{ related.name }}">
                    {% else %}
                    <div
                        style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:#9ca3af;">
                        <i class="fas fa-image fa-2x"></i>
                    </div>
                    {% endif %}
                </div>
                <div class="related-info">
                    <div class="related-name">{{ related.name }}</div>
                </div>
            </a>
            {% endfor %}
        </div>
    </div>
</div>
{% endif %}
